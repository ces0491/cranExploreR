name: CI

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages(c("shiny", "bslib", "httr2", "jsonlite", "plotly", "DT", "rsconnect"))
        shell: Rscript {0}

      - name: Parse all R files
        run: |
          files <- list.files(".", pattern = "\\.R$", recursive = TRUE, full.names = TRUE)
          for (f in files) {
            cat("Parsing", f, "\n")
            parse(f)
          }
          cat("All files parse OK\n")
        shell: Rscript {0}

      - name: Regenerate manifest.json
        run: |
          rsconnect::writeManifest(appDir = ".", appPrimaryDoc = "app.R")
        shell: Rscript {0}

      - name: Check manifest is up to date
        run: |
          if git diff --exit-code manifest.json; then
            echo "manifest.json is up to date"
          else
            echo "::error::manifest.json is out of date. Run rsconnect::writeManifest() locally and commit."
            exit 1
          fi

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to deploy branch
        run: git push origin HEAD:deploy --force
